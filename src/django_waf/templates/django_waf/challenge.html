<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>Security Check</title>
    <style>
        *,
        *::before,
        *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f0f2f5;
            color: #1a1a1a;
        }

        .container {
            text-align: center;
            padding: 2.5rem 2rem;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            max-width: 420px;
            width: 100%;
            margin: 1rem;
        }

        .shield {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            line-height: 1;
        }

        h1 {
            font-size: 1.25rem;
            margin: 0 0 0.5rem;
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            font-size: 0.875rem;
            margin: 0 0 1.5rem;
            line-height: 1.5;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top: 3px solid #374151;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 1.25rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #status {
            font-size: 0.875rem;
            color: #555;
            margin: 0 0 0.25rem;
            min-height: 1.25rem;
        }

        #status.success {
            color: #15803d;
            font-weight: 600;
        }

        .progress {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            overflow: hidden;
            margin: 0.75rem 0 0.25rem;
        }

        .progress-bar {
            height: 100%;
            width: 0;
            background: #374151;
            transition: width 0.2s linear;
        }

        #eta {
            font-size: 0.75rem;
            color: #9ca3af;
            min-height: 1rem;
            margin: 0;
        }

        #error {
            display: none;
            color: #b91c1c;
            font-size: 0.875rem;
            margin-top: 0.75rem;
            padding: 0.6rem 0.75rem;
            background: #fef2f2;
            border-radius: 6px;
        }

        .privacy-note {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #9ca3af;
            line-height: 1.5;
        }

        /* Respect user motion preferences */
        @media (prefers-reduced-motion: reduce) {
            .spinner { animation: none; border-top-color: #374151; }
        }
    </style>
</head>
<body>
    <div class="container" role="main">
        <div class="shield" aria-hidden="true">&#x1F6E1;</div>
        <h1>Verifying your browser</h1>
        <p class="subtitle">
            We're running a quick security check.<br>
            This usually takes a few seconds.
        </p>

        <div class="spinner" id="spinner" role="status" aria-label="Working…"></div>
        <p id="status" aria-live="polite">Working&hellip;</p>
        <div class="progress" aria-hidden="true"><div class="progress-bar" id="progress-bar"></div></div>
        <p id="eta" aria-live="polite"></p>
        <div id="error" role="alert"></div>

        <p class="privacy-note">
            No personal data is collected during this check.
        </p>
    </div>

    <script>
    (function () {
        "use strict";

        var token = "{{ token }}";
        var difficulty = {{ difficulty }};
        var nextUrl = "{{ next_url|escapejs }}";
        var postUrl = "{{ post_url|escapejs }}";
        var nonce = 0;

        var statusEl = document.getElementById("status");
        var spinnerEl = document.getElementById("spinner");
        var errorEl = document.getElementById("error");
        var progressBarEl = document.getElementById("progress-bar");
        var etaEl = document.getElementById("eta");

        // Expected attempts to solve: 2^difficulty on average. Used to drive
        // the progress bar (linear in attempts/expected) and the ETA, which
        // recomputes from observed hash rate every UI tick.
        var expectedAttempts = Math.pow(2, difficulty);
        // Safety ceiling: 64x the expected mean. A genuine solve essentially
        // never trips this (P(no solve after 64x mean) ~ e^-64); a
        // mis-configured difficulty fails fast and visibly instead of
        // grinding forever.
        var maxAttempts = expectedAttempts * 64;
        var startTime = 0;

        // --- Synchronous SHA-256 (standard 32-bit big-endian implementation) ---
        // Runs entirely on the CPU with no await per call, so the solve loop
        // below can grind millions of hashes/sec instead of being capped by
        // one crypto.subtle.digest() promise resolution per nonce. Produces
        // digests byte-identical to Python's hashlib.sha256 (verified against
        // the server's _digest_has_leading_zero_bits check).
        var SHA256_K = [
            0x428a2f98, 0x71374491, 0xb5c0fbcf, 0xe9b5dba5, 0x3956c25b, 0x59f111f1, 0x923f82a4, 0xab1c5ed5,
            0xd807aa98, 0x12835b01, 0x243185be, 0x550c7dc3, 0x72be5d74, 0x80deb1fe, 0x9bdc06a7, 0xc19bf174,
            0xe49b69c1, 0xefbe4786, 0x0fc19dc6, 0x240ca1cc, 0x2de92c6f, 0x4a7484aa, 0x5cb0a9dc, 0x76f988da,
            0x983e5152, 0xa831c66d, 0xb00327c8, 0xbf597fc7, 0xc6e00bf3, 0xd5a79147, 0x06ca6351, 0x14292967,
            0x27b70a85, 0x2e1b2138, 0x4d2c6dfc, 0x53380d13, 0x650a7354, 0x766a0abb, 0x81c2c92e, 0x92722c85,
            0xa2bfe8a1, 0xa81a664b, 0xc24b8b70, 0xc76c51a3, 0xd192e819, 0xd6990624, 0xf40e3585, 0x106aa070,
            0x19a4c116, 0x1e376c08, 0x2748774c, 0x34b0bcb5, 0x391c0cb3, 0x4ed8aa4a, 0x5b9cca4f, 0x682e6ff3,
            0x748f82ee, 0x78a5636f, 0x84c87814, 0x8cc70208, 0x90befffa, 0xa4506ceb, 0xbef9a3f7, 0xc67178f2
        ];

        function sha256(message) {
            var bytes = new TextEncoder().encode(message);
            var H = [
                0x6a09e667, 0xbb67ae85, 0x3c6ef372, 0xa54ff53a,
                0x510e527f, 0x9b05688c, 0x1f83d9ab, 0x5be0cd19
            ];

            var bitLen = bytes.length * 8;
            var withOne = bytes.length + 1;
            var padLen = ((withOne + 8 + 63) & ~63) - withOne - 8;
            var total = withOne + padLen + 8;
            var buf = new Uint8Array(total);
            buf.set(bytes, 0);
            buf[bytes.length] = 0x80;
            var hi = Math.floor(bitLen / 0x100000000);
            var lo = bitLen >>> 0;
            var view = new DataView(buf.buffer);
            view.setUint32(total - 8, hi, false);
            view.setUint32(total - 4, lo, false);

            var w = new Int32Array(64);
            for (var offset = 0; offset < total; offset += 64) {
                for (var i = 0; i < 16; i++) {
                    w[i] = view.getInt32(offset + i * 4, false);
                }
                for (i = 16; i < 64; i++) {
                    var s0v = w[i - 15];
                    var s0 = ((s0v >>> 7) | (s0v << 25)) ^ ((s0v >>> 18) | (s0v << 14)) ^ (s0v >>> 3);
                    var s1v = w[i - 2];
                    var s1 = ((s1v >>> 17) | (s1v << 15)) ^ ((s1v >>> 19) | (s1v << 13)) ^ (s1v >>> 10);
                    w[i] = (w[i - 16] + s0 + w[i - 7] + s1) | 0;
                }

                var a = H[0], b = H[1], c = H[2], d = H[3];
                var e = H[4], f = H[5], g = H[6], h = H[7];

                for (i = 0; i < 64; i++) {
                    var S1 = ((e >>> 6) | (e << 26)) ^ ((e >>> 11) | (e << 21)) ^ ((e >>> 25) | (e << 7));
                    var ch = (e & f) ^ (~e & g);
                    var temp1 = (h + S1 + ch + SHA256_K[i] + w[i]) | 0;
                    var S0 = ((a >>> 2) | (a << 30)) ^ ((a >>> 13) | (a << 19)) ^ ((a >>> 22) | (a << 10));
                    var maj = (a & b) ^ (a & c) ^ (b & c);
                    var temp2 = (S0 + maj) | 0;

                    h = g; g = f; f = e; e = (d + temp1) | 0;
                    d = c; c = b; b = a; a = (temp1 + temp2) | 0;
                }

                H[0] = (H[0] + a) | 0; H[1] = (H[1] + b) | 0; H[2] = (H[2] + c) | 0; H[3] = (H[3] + d) | 0;
                H[4] = (H[4] + e) | 0; H[5] = (H[5] + f) | 0; H[6] = (H[6] + g) | 0; H[7] = (H[7] + h) | 0;
            }

            var out = new Uint8Array(32);
            var outView = new DataView(out.buffer);
            for (i = 0; i < 8; i++) {
                outView.setInt32(i * 4, H[i], false);
            }
            return out;
        }

        // Return true iff the digest starts with `bits` zero bits.
        // Mirrors _digest_has_leading_zero_bits() in the Python verifier.
        function hasLeadingZeroBits(hash, bits) {
            var fullBytes = bits >>> 3;
            var remainder = bits & 7;
            for (var i = 0; i < fullBytes; i++) {
                if (hash[i] !== 0) return false;
            }
            if (remainder === 0) return true;
            var mask = (0xFF << (8 - remainder)) & 0xFF;
            return (hash[fullBytes] & mask) === 0;
        }

        function showError(message) {
            spinnerEl.style.display = "none";
            errorEl.textContent = message;
            errorEl.style.display = "block";
        }

        function formatEta(seconds) {
            if (!isFinite(seconds) || seconds < 0) return "";
            if (seconds < 1) return "less than a second";
            if (seconds < 60) return Math.round(seconds) + "s remaining";
            var mins = Math.ceil(seconds / 60);
            return "~" + mins + " min remaining";
        }

        function updateProgress() {
            var ratio = Math.min(nonce / expectedAttempts, 0.99);
            progressBarEl.style.width = (ratio * 100).toFixed(1) + "%";

            var elapsed = (performance.now() - startTime) / 1000;
            if (elapsed > 0.25 && nonce > 0) {
                var rate = nonce / elapsed; // hashes per second
                var remainingAttempts = Math.max(expectedAttempts - nonce, 0);
                etaEl.textContent = formatEta(remainingAttempts / rate);
            }
        }

        // Yield to the browser event loop to keep the UI responsive.
        function yieldToUI() {
            return new Promise(function (resolve) { setTimeout(resolve, 0); });
        }

        async function solve() {
            startTime = performance.now();
            while (true) {
                var hash = sha256(token + nonce.toString());
                if (hasLeadingZeroBits(hash, difficulty)) {
                    statusEl.textContent = "Verified!";
                    statusEl.className = "success";
                    progressBarEl.style.width = "100%";
                    etaEl.textContent = "";
                    spinnerEl.style.display = "none";
                    await submit(nonce.toString());
                    return;
                }
                nonce++;
                if (nonce > maxAttempts) {
                    showError("Verification is taking longer than expected. Please refresh the page.");
                    return;
                }
                // Yield every 2 000 iterations to keep UI responsive and
                // give the progress bar a chance to repaint.
                if (nonce % 2000 === 0) {
                    statusEl.textContent = "Working\u2026 (" + nonce.toLocaleString() + " attempts)";
                    updateProgress();
                    await yieldToUI();
                }
            }
        }

        async function submit(solution) {
            var resp;
            try {
                resp = await fetch(postUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: token, nonce: solution, next: nextUrl }),
                    redirect: "manual",
                });
            } catch (err) {
                showError("Network error. Please refresh the page.");
                return;
            }

            // Any 2xx or redirect = success.
            if (resp.ok || resp.type === "opaqueredirect" || resp.status === 302) {
                window.location.href = nextUrl;
                return;
            }

            // Server returned an error — extract reason and retry token.
            var data = null;
            try {
                data = await resp.json();
            } catch (_) {
                showError("Verification failed. Please refresh the page.");
                return;
            }

            if (data && data.new_token) {
                // Retry with the fresh token.
                token = data.new_token;
                nonce = 0;
                progressBarEl.style.width = "0";
                etaEl.textContent = "";
                errorEl.style.display = "none";
                spinnerEl.style.display = "block";
                statusEl.textContent = "Retrying\u2026";
                statusEl.className = "";
                solve();
            } else {
                showError(
                    (data && data.error)
                        ? data.error
                        : "Verification failed. Please refresh the page."
                );
            }
        }

        // Check TextEncoder availability (required by all modern browsers).
        // The synchronous SHA-256 above has no crypto.subtle dependency.
        if (typeof TextEncoder === "undefined") {
            showError(
                "Your browser does not support the security check. " +
                "Please use a modern browser or enable JavaScript."
            );
            return;
        }

        solve();
    })();
    </script>
</body>
</html>
