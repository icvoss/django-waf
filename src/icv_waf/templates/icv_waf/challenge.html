<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Security Check</title>
    <style>
        *,
        *::before,
        *::after { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f0f2f5;
            color: #1a1a1a;
        }

        .container {
            text-align: center;
            padding: 2.5rem 2rem;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            max-width: 420px;
            width: 100%;
            margin: 1rem;
        }

        .shield {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            line-height: 1;
        }

        h1 {
            font-size: 1.25rem;
            margin: 0 0 0.5rem;
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            font-size: 0.875rem;
            margin: 0 0 1.5rem;
            line-height: 1.5;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e5e7eb;
            border-top: 3px solid #374151;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin: 0 auto 1.25rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #status {
            font-size: 0.875rem;
            color: #555;
            margin: 0 0 0.25rem;
            min-height: 1.25rem;
        }

        #status.success {
            color: #15803d;
            font-weight: 600;
        }

        .progress {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            overflow: hidden;
            margin: 0.75rem 0 0.25rem;
        }

        .progress-bar {
            height: 100%;
            width: 0;
            background: #374151;
            transition: width 0.2s linear;
        }

        #eta {
            font-size: 0.75rem;
            color: #9ca3af;
            min-height: 1rem;
            margin: 0;
        }

        #error {
            display: none;
            color: #b91c1c;
            font-size: 0.875rem;
            margin-top: 0.75rem;
            padding: 0.6rem 0.75rem;
            background: #fef2f2;
            border-radius: 6px;
        }

        .privacy-note {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #9ca3af;
            line-height: 1.5;
        }

        /* Respect user motion preferences */
        @media (prefers-reduced-motion: reduce) {
            .spinner { animation: none; border-top-color: #374151; }
        }
    </style>
</head>
<body>
    <div class="container" role="main">
        <div class="shield" aria-hidden="true">&#x1F6E1;</div>
        <h1>Verifying your browser</h1>
        <p class="subtitle">
            We're running a quick security check.<br>
            This usually takes a few seconds.
        </p>

        <div class="spinner" id="spinner" role="status" aria-label="Working…"></div>
        <p id="status" aria-live="polite">Working&hellip;</p>
        <div class="progress" aria-hidden="true"><div class="progress-bar" id="progress-bar"></div></div>
        <p id="eta" aria-live="polite"></p>
        <div id="error" role="alert"></div>

        <p class="privacy-note">
            No personal data is collected during this check.
        </p>
    </div>

    <script>
    (function () {
        "use strict";

        var token = "{{ token }}";
        var difficulty = {{ difficulty }};
        var nextUrl = "{{ next_url|escapejs }}";
        var postUrl = "{{ post_url|escapejs }}";
        var nonce = 0;

        var statusEl = document.getElementById("status");
        var spinnerEl = document.getElementById("spinner");
        var errorEl = document.getElementById("error");
        var progressBarEl = document.getElementById("progress-bar");
        var etaEl = document.getElementById("eta");

        // Expected attempts to solve: 2^difficulty on average. Used to drive
        // the progress bar (linear in attempts/expected) and the ETA, which
        // recomputes from observed hash rate every UI tick.
        var expectedAttempts = Math.pow(2, difficulty);
        var startTime = 0;

        // --- SHA-256 via Web Crypto API ---
        function sha256(message) {
            var buf = new TextEncoder().encode(message);
            return crypto.subtle.digest("SHA-256", buf).then(function (hash) {
                return new Uint8Array(hash);
            });
        }

        // Return true iff the digest starts with `bits` zero bits.
        // Mirrors _digest_has_leading_zero_bits() in the Python verifier.
        function hasLeadingZeroBits(hash, bits) {
            var fullBytes = bits >>> 3;
            var remainder = bits & 7;
            for (var i = 0; i < fullBytes; i++) {
                if (hash[i] !== 0) return false;
            }
            if (remainder === 0) return true;
            var mask = (0xFF << (8 - remainder)) & 0xFF;
            return (hash[fullBytes] & mask) === 0;
        }

        function showError(message) {
            spinnerEl.style.display = "none";
            errorEl.textContent = message;
            errorEl.style.display = "block";
        }

        function formatEta(seconds) {
            if (!isFinite(seconds) || seconds < 0) return "";
            if (seconds < 1) return "less than a second";
            if (seconds < 60) return Math.round(seconds) + "s remaining";
            var mins = Math.ceil(seconds / 60);
            return "~" + mins + " min remaining";
        }

        function updateProgress() {
            var ratio = Math.min(nonce / expectedAttempts, 0.99);
            progressBarEl.style.width = (ratio * 100).toFixed(1) + "%";

            var elapsed = (performance.now() - startTime) / 1000;
            if (elapsed > 0.25 && nonce > 0) {
                var rate = nonce / elapsed; // hashes per second
                var remainingAttempts = Math.max(expectedAttempts - nonce, 0);
                etaEl.textContent = formatEta(remainingAttempts / rate);
            }
        }

        // Yield to the browser event loop to keep the UI responsive.
        function yieldToUI() {
            return new Promise(function (resolve) { setTimeout(resolve, 0); });
        }

        async function solve() {
            startTime = performance.now();
            while (true) {
                var hash = await sha256(token + nonce.toString());
                if (hasLeadingZeroBits(hash, difficulty)) {
                    statusEl.textContent = "Verified!";
                    statusEl.className = "success";
                    progressBarEl.style.width = "100%";
                    etaEl.textContent = "";
                    spinnerEl.style.display = "none";
                    await submit(nonce.toString());
                    return;
                }
                nonce++;
                // Yield every 2 000 iterations to keep UI responsive and
                // give the progress bar a chance to repaint.
                if (nonce % 2000 === 0) {
                    statusEl.textContent = "Working\u2026 (" + nonce.toLocaleString() + " attempts)";
                    updateProgress();
                    await yieldToUI();
                }
            }
        }

        async function submit(solution) {
            var resp;
            try {
                resp = await fetch(postUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: token, nonce: solution, next: nextUrl }),
                    redirect: "manual",
                });
            } catch (err) {
                showError("Network error. Please refresh the page.");
                return;
            }

            // Any 2xx or redirect = success.
            if (resp.ok || resp.type === "opaqueredirect" || resp.status === 302) {
                window.location.href = nextUrl;
                return;
            }

            // Server returned an error — extract reason and retry token.
            var data = null;
            try {
                data = await resp.json();
            } catch (_) {
                showError("Verification failed. Please refresh the page.");
                return;
            }

            if (data && data.new_token) {
                // Retry with the fresh token.
                token = data.new_token;
                nonce = 0;
                progressBarEl.style.width = "0";
                etaEl.textContent = "";
                errorEl.style.display = "none";
                spinnerEl.style.display = "block";
                statusEl.textContent = "Retrying\u2026";
                statusEl.className = "";
                solve();
            } else {
                showError(
                    (data && data.error)
                        ? data.error
                        : "Verification failed. Please refresh the page."
                );
            }
        }

        // Check Web Crypto availability (required by all modern browsers).
        if (typeof crypto === "undefined" || !crypto.subtle) {
            showError(
                "Your browser does not support the security check. " +
                "Please use a modern browser or enable JavaScript."
            );
            return;
        }

        solve();
    })();
    </script>
</body>
</html>
